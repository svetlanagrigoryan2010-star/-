<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Викторина «Семь чудес света»</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');

body {
    font-family: 'Montserrat', sans-serif;
    margin: 0;
    padding: 20px;
    color: #1e293b;

   
}

/* Баннер */
.div {
    width: 70%;
    height: 260px;
    margin: 0 auto 30px;
    border-radius: 24px;

    background-image: url("https://images.unsplash.com/photo-1608032077018-c9aad9565d29");
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;

    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

/* Заголовок */
h1 {
    text-align: center;
    font-size: 2.5em;
    margin-bottom: 25px;
    color: #1e293b;
}

/* Карточки */
.question {
    background: rgba(255, 255, 255, 0.9);
    margin: 20px auto;
    padding: 22px;
    border-radius: 16px;
    max-width: 700px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Кнопки */
.options button {
    display: block;
    width: 100%;
    margin: 8px 0;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;

    /* новый цвет кнопок */
    background-color: #c7d2fe;
    color: #1e293b;

    transition: 0.2s;
}

.options button:hover {
    background-color: #a5b4fc;
}

/* Ответы */
.options button.correct {
    background-color: #4ade80;
    color: white;
}

.options button.wrong {
    background-color: #f87171;
    color: white;
}

/* Progress bar */
#progressContainer {
    max-width: 700px;
    margin: 0 auto 20px;
    height: 10px;
    background-color: #c7d2fe;
    border-radius: 10px;
}

#progressBar {
    height: 100%;
    width: 0%;
    background-color: #4f46e5;
}

/* Результат */
#result {
    text-align: center;
    font-size: 22px;
    margin-top: 25px;
    font-weight: 700;
    color: #e0e7ff;
}

/* Кнопка */
#showScoreBtn {
    display: block;
    margin: 20px auto;
    padding: 14px 24px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;

    background-color: #a5b4fc;
    color: #1e293b;
}

#showScoreBtn:hover {
    background-color: #818cf8;
}
</style>
</head>

<body>
<div class="div"></div>
<h1>Викторина «Семь чудес света»</h1>

<div id="progressContainer">
    <div id="progressBar"></div>
</div>

<div id="quiz"></div>
<div id="result"></div>
<button id="showScoreBtn">Показать результат</button>

<script>
const questions = [
    {q:"1. В какой стране находится единственное сохранившееся чудо света?", options:["в Египте","в Италии","в Византии","в Англии"], answer:0},
    {q:"2. Что вавилонский царь Навуходоносор приказал создать для своей жены?", options:["пирамиду","маяк","висячие сады","бассейн"], answer:2},
    {q:"3. В Эфесе был сооружен…", options:["храм Зевса","храм Артемиды","храм Перуна","храм Рамзеса"], answer:1},
    {q:"4. Назовите имя фараона, для которого было возведено одно из семи чудес света.", options:["Эрехтейон","Зевс","Хеопс","Арагон"], answer:2},
{q:"5. Как называется остров в Эгейском море, на котором стояла гигантская статуя, считающаяся одним из семи чудес света?", options:["Крит","Самос","Эвбей","Родос"], answer:3},
    {q:"6. Александрийский маяк был разрушен…", options:["при военных действиях","во время землетрясения","во время пожара","во время наводнения"], answer:1},
    {q:"7. К семи чудесам света не относится…", options:["мавзолей царя Мавсола","Вавилонская башня","Александрийский маяк","пирамида Хеопса"], answer:1},
    {q:"8. В какой стране располагался храм Зевса, в котором находилась статуя Зевса Олимпийского?", options:["в Испании","в Дании","в Албании","в Греции"], answer:3},
    {q:"9. На каком острове был построен Александрийский маяк?", options:["на острове Сулавеси","на острове Фарос","на острове Ява","на острове Гаити"], answer:1}
];


const quizDiv = document.getElementById("quiz");
const progressBar = document.getElementById("progressBar");

let score = 0;
let answered = 0;

questions.forEach((q) => {
    const questionDiv = document.createElement("div");
    questionDiv.classList.add("question");

    const title = document.createElement("h3");
    title.textContent = q.q;
    questionDiv.appendChild(title);

    const optionsDiv = document.createElement("div");
    optionsDiv.classList.add("options");

    let attempt = 0;

    q.options.forEach((opt, i) => {
        const button = document.createElement("button");
        button.textContent = opt;

        button.addEventListener("click", () => {
            if (button.disabled) return;

            if (i === q.answer) {
                button.classList.add("correct");
                if (attempt < 2) score++;
            } else {
                attempt++;
                button.classList.add("wrong");
                button.disabled = true;

                if (attempt >= 2) {
                    optionsDiv.children[q.answer].classList.add("correct");
                }
            }

            Array.from(optionsDiv.children).forEach(btn => btn.disabled = true);

            answered++;
            progressBar.style.width = (answered / questions.length) * 100 + "%";
        });

        optionsDiv.appendChild(button);
    });

    questionDiv.appendChild(optionsDiv);
    quizDiv.appendChild(questionDiv);
});

document.getElementById("showScoreBtn").addEventListener("click", () => {
    document.getElementById("result").textContent =
        `Ваш результат: ${score} из ${questions.length}`;
});
</script>

</body>
</html>
